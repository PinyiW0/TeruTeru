<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    /* 以 vmin 為單位,讓內容隨 viewport 等比縮放,可一次截多種尺寸 */
    background: linear-gradient(180deg, #aee3ff 0%, #d6f0ff 50%, #fff7e0 100%);
    position: relative;
    overflow: hidden;
  }
  /* 太陽 */
  .sun {
    position: absolute;
    top: 12vmin; right: 14vmin;
    width: 26vmin; height: 26vmin;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #ffe27a, #ffb347);
    box-shadow: 0 0 12vmin 3vmin rgba(255, 196, 87, 0.5);
  }
  .teru { filter: drop-shadow(0 3vmin 3vmin rgba(120,120,140,0.2)); }
</style>
</head>
<body>
  <div class="sun"></div>

  <!-- 1:1 採用 app/components/TeruDoll.vue 的 classic 造型 -->
  <svg class="teru" width="56vmin" height="56vmin" viewBox="0 0 60 92" style="overflow: visible;">
    <defs>
      <radialGradient id="headShade" cx="0.35" cy="0.3" r="0.8">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9" />
        <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0" />
        <stop offset="100%" stop-color="#A0B0C0" stop-opacity="0.4" />
      </radialGradient>
      <linearGradient id="bodyShade" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#D8DEE8" stop-opacity="0.5" />
        <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0" />
        <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.6" />
      </linearGradient>
    </defs>

    <line x1="30" y1="0" x2="30" y2="10" stroke="#3A2A1A" stroke-width="1" stroke-linecap="round" />
    <circle cx="30" cy="10" r="1.4" fill="#3A2A1A" />

    <ellipse cx="30" cy="84" rx="16" ry="1.8" fill="rgba(40,60,90,0.10)" />

    <path d="M 20 38 Q 14 54 12 76 Q 16 80 20 76 Q 24 82 28 76 Q 32 82 36 76 Q 40 82 44 76 Q 48 80 48 76 Q 46 54 40 38 Z"
          fill="#FBFBFB" stroke="rgba(40,60,90,0.16)" stroke-width="0.8" />
    <path d="M 20 38 Q 14 54 12 76 Q 16 80 20 76 Q 24 82 28 76 Q 32 82 36 76 Q 40 82 44 76 Q 48 80 48 76 Q 46 54 40 38 Z"
          fill="url(#bodyShade)" opacity="0.55" />

    <rect x="17" y="36" width="26" height="4.6" rx="1.6" fill="#E27E6F" />
    <rect x="17" y="36" width="26" height="1.2" rx="0.6" fill="rgba(255,255,255,0.45)" />
    <path d="M 41 40 Q 47 42 46 47 L 43 45 Z" fill="#E27E6F" opacity="0.85" />

    <circle cx="30" cy="25" r="14.5" fill="#FEFEFE" stroke="rgba(40,60,90,0.14)" stroke-width="0.8" />
    <circle cx="30" cy="25" r="14.5" fill="url(#headShade)" opacity="0.7" />

    <ellipse cx="20" cy="28" rx="3.6" ry="2.4" fill="#F2A8A2" opacity="0.75" />
    <ellipse cx="40" cy="28" rx="3.6" ry="2.4" fill="#F2A8A2" opacity="0.75" />

    <ellipse cx="25" cy="22" rx="1.4" ry="1.7" fill="#1F2A3A" />
    <ellipse cx="35" cy="22" rx="1.4" ry="1.7" fill="#1F2A3A" />
    <path d="M 27.5 28 Q 30 30.5 32.5 28" stroke="#9B5346" stroke-width="1.2" stroke-linecap="round" fill="none" />
  </svg>
</body>
</html>
